name: CI

on:
  push:
    branches: [main, 001-physician-locator]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (tsc -b)
        run: npm run build

  unit-tests:
    name: Unit Tests (packages/core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  e2e-tests:
    name: E2E Tests (API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: careequity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: elasticsearch:8.10.2
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: careequity
      ELASTICSEARCH_NODE: http://localhost:9200
      ELASTICSEARCH_USERNAME: ""
      ELASTICSEARCH_PASSWORD: ""
      JWT_SECRET: careequity-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run database migrations
        run: npm run db:migrate

      - name: Create Elasticsearch providers index
        run: |
          curl -sf -X PUT "http://localhost:9200/providers" \
            -H 'Content-Type: application/json' \
            -d '{"mappings":{"properties":{"name":{"type":"text"},"specialties":{"type":"keyword"},"languages":{"type":"keyword"},"location":{"type":"geo_point"},"insurance":{"type":"keyword"},"verification_tier":{"type":"integer"}}}}'

      - name: Run API e2e tests
        run: npm run test:e2e --workspace=apps/api
